name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff
        run: |
          ruff --version
          ruff check . --output-format=github
      - name: Unit tests
        run: pytest -q
      - name: Check markdown links
        run: python scripts/check_links.py --skip-remote
      - name: Verify benchmark artifacts consistency
        run: python scripts/verify_results_consistency.py
